<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />

  <title>Journara Pro</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<div id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">Journara</div>
    <button id="newEntryBtn" class="btn primary">+ یادداشت</button>
  </header>

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="hero card">
      <div id="today"></div>
      <div class="mood">
        <span id="moodEmoji">🙂</span>
        <input id="moodSlider" type="range" min="0" max="6" value="3" />
      </div>
    </div>

    <div id="list" class="list"></div>
  </section>

  <!-- READER -->
  <section id="reader" class="screen">
    <button id="backBtn">←</button>
    <div id="readerContent" class="reader"></div>
  </section>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <input id="title" placeholder="عنوان..." />
      <textarea id="body" placeholder="بنویس..."></textarea>
      <button id="saveBtn" class="btn primary">ذخیره</button>
    </div>
  </div>

</div>

<script type="module" src="./app.js"></script>
</body>
</html>
