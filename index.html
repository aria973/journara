<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover"
/>

<meta name="theme-color" content="#0c1222">

<title>Journara</title>

<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="./styles.css">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Journara">

</head>

<body>

<div id="app" class="app">

<div class="aurora aurora-a"></div>
<div class="aurora aurora-b"></div>
<div class="aurora aurora-c"></div>

<header class="topbar glass">

<div class="brand">

<div class="brand-dot"></div>

<div>
<p class="brand-sub">
ژورنال شخصی
</p>

<h1>
Journara
</h1>
</div>

</div>

<div class="top-actions">

<button
id="themeBtn"
class="icon-btn"
aria-label="theme">
☼
</button>

</div>

</header>

<main id="pages">

<section
id="homePage"
class="page active">

<div class="hero glass">

<div
id="heroDate"
class="hero-date">

<div id="heroWeekday">
شنبه
</div>

<div id="heroDay">
24
</div>

<div id="heroMonth">
خرداد
</div>

</div>

<div class="hero-actions">

<button
id="todayJournalBtn"
class="primary-btn">
ژورنال امروز
</button>

</div>

</div>

<div
id="todayCard"
class="today-card glass hidden">
</div>

<div class="mood-card glass">

<div class="mood-head">

<div>
<h3>
حال امروز
</h3>

<p>
مود روزت را انتخاب کن
</p>
</div>

<div
id="moodEmoji"
class="mood-emoji">
🙂
</div>

</div>

<input
id="moodSlider"
type="range"
min="0"
max="6"
step="1"
value="3">

<div
id="moodLabel"
class="mood-label">
متعادل
</div>

</div>

</section>

<section
id="listPage"
class="page">

<div class="section-head">

<h2>
همه ژورنال‌ها
</h2>

<button
id="newEntryBtn"
class="soft-btn">
+
</button>

</div>

<div
id="journalList"
class="journal-list">
</div>

</section>

<section
id="settingsPage"
class="page">

<div class="settings-grid">

<div class="card glass">

<h3>
ظاهر
</h3>

<select id="themeSelect">

<option value="aurora">
Aurora
</option>

<option value="midnight">
Midnight
</option>

<option value="candy">
Candy
</option>

</select>

</div>

<div class="card glass">

<h3>
پشتیبان گیری
</h3>

<button
id="exportBtn"
class="soft-btn">
خروجی JSON
</button>

<input
type="file"
id="importInput">

</div>

<div class="card glass">

<h3>
نگهداری
</h3>

<button
id="resetBtn"
class="danger-btn">
حذف همه داده‌ها
</button>

</div>

</div>

</section>

<section
id="readerPage"
class="page">

<div class="reader-header">

<button
id="readerBackBtn"
class="icon-btn">
←
</button>

<button
id="readerDeleteBtn"
class="icon-btn">
🗑
</button>

</div>

<article
id="readerContent"
class="reader glass">
</article>

</section>

</main>

<nav class="tabbar glass">

<button
class="tab active"
data-page="home">
خانه
</button>

<button
class="tab"
data-page="list">
ژورنال‌ها
</button>

<button
class="tab"
data-page="settings">
تنظیمات
</button>

</nav>

</div>

<dialog id="editorModal">

<div class="editor glass">

<div class="editor-head">

<h2 id="editorTitle">
ژورنال
</h2>

<button
id="closeEditorBtn"
class="icon-btn">
✕
</button>

</div>

<input
id="entryTitle"
class="text-input"
placeholder="عنوان">

<textarea
id="entryBody"
class="text-area"
placeholder="امروز چه گذشت؟">
</textarea>

<input
type="file"
id="mediaInput"
multiple
accept="image/*,video/*">

<div
id="mediaPreview"
class="media-preview">
</div>

<button
id="saveEntryBtn"
class="primary-btn full">
ذخیره
</button>

</div>

</dialog>

<script src="./app.js"></script>

</body>
</html>
