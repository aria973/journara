<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <title>Journara Pro</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app" id="app">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="brand">Journara</div>
      <button id="newBtn" class="btn primary">+ جدید</button>
    </header>

    <!-- HOME -->
    <main class="screen active" id="homeScreen">
      <section class="hero card">
        <div class="date" id="todayDate"></div>
        <div class="mood">
          <span id="moodEmoji">🙂</span>
          <input id="mood" type="range" min="0" max="6" value="3"/>
        </div>
      </section>

      <section class="list" id="list"></section>
    </main>

    <!-- READER -->
    <main class="screen" id="readerScreen">
      <button class="back" id="backBtn">←</button>
      <article id="reader"></article>
    </main>

    <!-- MODAL -->
    <div class="modal hidden" id="modal">
      <div class="modalBox">
        <input id="title" placeholder="عنوان..." />
        <textarea id="body" placeholder="بنویس..."></textarea>
        <button id="saveBtn" class="btn primary">ذخیره</button>
      </div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
